<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>方向板</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--shadow:0 8px 24px rgba(15,23,42,.06);--r:18px}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#fbfdff,#f6f7fb 30%,#f6f7fb);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.5}
button,input,textarea,select{font:inherit}.app{max-width:760px;margin:0 auto;min-height:100vh;padding:calc(env(safe-area-inset-top,0px) + 34px) 14px 96px}.page{display:none}.page.active{display:block}
.card,details.box{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}details.box{padding:0;overflow:hidden}details.box>summary{list-style:none;cursor:pointer;padding:16px;font-weight:800}details.box>summary::-webkit-details-marker{display:none}.body{padding:0 16px 16px}
h2{font-size:16px;margin:0 0 12px;font-weight:800}.muted{color:var(--muted);font-size:13px}.small{font-size:12px;color:var(--muted)}.num{font-size:28px;font-weight:900;letter-spacing:-.5px}.row{display:flex;gap:10px;align-items:center;justify-content:space-between}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;background:#fff;outline:none}textarea{min-height:74px;resize:vertical}.label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
.btn{border:1px solid var(--line);border-radius:14px;padding:11px 14px;background:#f3f4f6}.btn.primary{background:#111827;color:#fff;border-color:#111827}.btn.danger{background:#fef2f2;color:#dc2626;border-color:#fecaca}.btn.soft{background:#eff6ff;color:#1d4ed8;border-color:#dbeafe}.btn.success{background:#ecfdf5;color:#059669;border-color:#d1fae5}.btn.block{width:100%}.btn.smallBtn{padding:8px 10px;font-size:13px}
.bar{height:8px;border-radius:999px;background:#eef2f7;overflow:hidden;margin-top:8px}.bar span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#111827,#2563eb);width:0%}
.mini{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px}.mini .name{font-size:13px;color:var(--muted)}.mini .value{font-size:20px;font-weight:900}.miniLine{font-size:13px;color:var(--muted);margin-top:8px}
.record{display:flex;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:8px;background:#fff}.record .main{font-size:13px}.record .sub{font-size:12px;color:var(--muted)}.recordActions{display:flex;gap:6px;align-items:center}
.nav{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);width:min(760px,calc(100% - 20px));background:rgba(255,255,255,.95);border:1px solid var(--line);box-shadow:0 12px 30px rgba(15,23,42,.1);border-radius:18px;padding:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.tab{border:0;background:transparent;border-radius:14px;padding:10px 6px;color:var(--muted);font-size:12px}.tab.active{background:#111827;color:#fff}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(10px);width:min(540px,calc(100% - 24px));background:#111827;color:#fff;border-radius:14px;padding:12px 14px;opacity:0;transition:.18s;z-index:9}.toast.show{opacity:1;transform:translateX(-50%)}
.hidden-file{display:none}.inlineStats{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.pill{font-size:12px;color:#374151;background:#f9fafb;border:1px solid var(--line);border-radius:999px;padding:6px 9px}.prepList{display:grid;gap:8px;margin-top:12px}.prepItem{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}.prepItem input{flex:0 0 auto;width:18px;height:18px;accent-color:#111827}.prepItem span{flex:1;min-width:0;font-size:14px;line-height:1.4;word-break:normal;color:var(--text)}
@media(max-width:640px){.grid2{grid-template-columns:1fr}.grid4{grid-template-columns:repeat(2,1fr)}.grid{gap:8px}.mini{padding:10px}.mini .value{font-size:18px}}
</style>
</head>
<body>
<div class="app">
<section class="page active" id="home">
<details class="box"><summary>北极星总目标</summary><div class="body"><textarea id="northStar"></textarea></div></details>
<div class="card"><div class="row"><div><div class="small">当前阶段主线</div><div class="muted" id="stageText"></div></div><div class="num" id="stageNum">0%</div></div><div class="bar"><span id="stageBar"></span></div></div>
<div class="grid" id="lineCards"></div>
<div class="card" id="homeReviewCard" style="margin-top:14px"><div class="small">昨日推进</div><div class="muted" id="homeYesterday">暂无</div><div class="small" style="margin-top:10px">今天优先</div><div class="muted" id="homeToday">暂无</div></div>
<details class="box" style="margin-top:14px"><summary>阶段目标详情</summary><div class="body" id="stageDetails"></div></details>
</section>

<section class="page" id="lines">
<div class="card"><h2>雅思</h2><div class="row"><div><div class="small">整体进度</div><div class="muted" id="ieltsAvg"></div></div><div class="num" id="ieltsNum">0%</div></div><div class="bar"><span id="ieltsBar"></span></div><div class="grid" id="ieltsParts" style="margin-top:12px"></div>
<details class="box" style="box-shadow:none;margin-top:12px"><summary>练习量与准备清单</summary><div class="body"><div class="grid2">
<div class="mini"><div class="name">阅读完成</div><div class="value" id="readingAutoCount">0/40</div><div class="miniLine">根据阅读成绩记录自动统计</div></div>
<div class="mini"><div class="name">听力完成</div><div class="value" id="listeningAutoCount">0/40</div><div class="miniLine">根据听力成绩记录自动统计</div></div>
<div><label class="label">小作文 /30</label><input id="t1" type="number" min="0"></div><div><label class="label">大作文 /30</label><input id="t2" type="number" min="0"></div><div><label class="label">口语 /110</label><input id="sp" type="number" min="0"></div><div><label class="label">剑雅20模考 /4</label><input id="mk" type="number" min="0"></div></div><div id="prep"></div></div></details>
<details class="box" style="box-shadow:none"><summary>添加雅思成绩记录</summary><div class="body"><div class="grid2"><div><label class="label">日期</label><input id="scoreDate" type="date"></div><div><label class="label">剑雅册数</label><input id="cam" type="number" min="1" max="20"></div><div><label class="label">Test</label><select id="test"><option>1</option><option>2</option><option>3</option><option>4</option></select></div><div><label class="label">科目</label><select id="sub"><option value="reading">阅读</option><option value="listening">听力</option><option value="writing">写作</option><option value="speaking">口语</option></select></div><div><label class="label">分数</label><input id="score" type="number" min="0" max="9" step="0.5"></div><div><label class="label">备注</label><input id="note"></div></div><button class="btn primary block" id="addScore" style="margin-top:10px">保存成绩记录</button></div></details></div>

<div class="card"><h2>家教</h2>
<div class="mini" style="margin-top:12px"><div class="row"><div><div class="name">本周招生发布</div><div class="value" id="tuWeekText">0/4</div></div></div><div class="bar"><span id="tuWeekBar"></span></div></div>
<details class="box" style="box-shadow:none;margin-top:12px"><summary>记录招生发布</summary><div class="body"><div class="grid2"><div><label class="label">记录日期</label><input id="tuPubDate" type="date"></div><div><label class="label">本次发布数量</label><input id="tuPubAmount" type="number" min="0" placeholder="例如 3"></div><div class="field full"><label class="label">备注，可不填</label><input id="tuPubNote" placeholder="例如 小红书2篇，公众号1篇"></div></div><button class="btn primary block" id="saveTuPublish" style="margin-top:10px">确认保存招生发布</button></div></details>
<details class="box" style="box-shadow:none;margin-top:12px"><summary>更新收入 / 学生</summary><div class="body"><div class="grid2"><div><label class="label">当前稳定月收入</label><input id="tuI" type="number" min="0"></div><div><label class="label">当前稳定学生数</label><input id="tuStu" type="number" min="0"></div></div><button class="btn primary block" id="saveTuStatus" style="margin-top:10px">保存收入 / 学生</button></div></details></div>

<div class="card"><h2>小说</h2>
<div class="mini" style="margin-top:12px"><div class="row"><div><div class="name">本周进度</div><div class="value" id="fiWeekText">0/5</div></div></div><div class="bar"><span id="fiWeekBar"></span></div><div class="inlineStats" id="fiWeekBreakdown"></div></div>
<details class="box" style="box-shadow:none;margin-top:12px"><summary>更新小说进度</summary><div class="body"><div class="grid2"><div><label class="label">记录日期</label><input id="fiDate" type="date"></div><div><label class="label">原创初稿</label><input id="fiDraftInput" type="number" min="0" placeholder="0"></div><div><label class="label">拆解</label><input id="fiAnalysisInput" type="number" min="0" placeholder="0"></div><div><label class="label">仿写</label><input id="fiImitationInput" type="number" min="0" placeholder="0"></div><div><label class="label">修改</label><input id="fiRevisionInput" type="number" min="0" placeholder="0"></div><div><label class="label">收入金额</label><input id="fiIncomeInput" type="number" min="0" placeholder="0"></div><div class="field full"><label class="label">备注，可不填</label><input id="fiNoteInput" placeholder="例如 本周集中补记录"></div></div><button class="btn primary block" id="saveFiProgress" style="margin-top:10px">确认保存小说进度</button></div></details></div>
</section>

<section class="page" id="review">
<div class="card"><h2>复盘</h2><label class="label">今天推进了什么</label><textarea id="reviewToday"></textarea><label class="label">明天先做什么</label><textarea id="reviewTomorrow"></textarea></div>
</section>

<section class="page" id="settings">
<details class="box" open><summary>30w 现金目标</summary><div class="body"><div class="row"><div><div class="small">当前资产</div><div class="muted" id="cashText"></div></div><div class="num" id="cashPct">0%</div></div><div class="bar"><span id="cashBar"></span></div><div class="grid" id="cashCards" style="margin-top:12px"></div><div class="muted" id="autoText" style="margin-top:10px"></div>
<details class="box" style="box-shadow:none;margin-top:12px"><summary>资产数据</summary><div class="body"><div class="grid2"><div><label class="label">目标总现金</label><input id="cashTarget" type="number"></div><div><label class="label">当前存款</label><input id="cashSavings" type="number"></div><div><label class="label">投资资产合计</label><input id="invest" type="number"></div><div><label class="label">每月现金增长</label><input id="cashAuto" type="number"></div><div><label class="label">每月投资增长</label><input id="investAuto" type="number"></div></div><button class="btn primary block" id="saveCashData" style="margin-top:10px">保存资产数据</button></div></details></div></details>
<details class="box"><summary>提醒设置</summary><div class="body"><div class="grid2"><div><label class="label">早上</label><input id="morningTime" type="time"></div><div><label class="label">下午</label><input id="noonTime" type="time"></div><div><label class="label">晚上</label><input id="nightTime" type="time"></div></div><label class="label">早上提醒文案</label><textarea id="morningTip"></textarea><label class="label">下午提醒文案</label><textarea id="noonTip"></textarea><label class="label">晚上提醒文案</label><textarea id="nightTip"></textarea><button class="btn primary block" id="saveReminder">保存提醒设置</button></div></details>
<details class="box"><summary>数据同步与备份</summary><div class="body"><div class="grid2"><button class="btn primary" id="cloudSave">同步到云端</button><button class="btn" id="cloudLoad">从云端恢复</button><button class="btn" id="exportBtn">导出备份</button><button class="btn" id="importBtn">导入备份</button><input class="hidden-file" type="file" id="importFile" accept="application/json,.json"></div></div></details>
<div class="card"><button class="btn block" id="openIdeas">灵感停车场 ＞</button><button class="btn block" id="openWins" style="margin-top:10px">已拥有清单 ＞</button></div>
<details class="box"><summary>历史记录管理</summary><div class="body">
<button class="btn block" id="openScoreHistory">雅思成绩记录 ＞</button>
<button class="btn block" id="openTuPublishHistory" style="margin-top:10px">家教发布记录 ＞</button>
<button class="btn block" id="openTuStatusHistory" style="margin-top:10px">家教收入/学生记录 ＞</button>
<button class="btn block" id="openFiRecordHistory" style="margin-top:10px">小说进度记录 ＞</button>
</div></details>
</section>

<section class="page" id="ideasPage">
<div class="card"><div class="row"><h2 style="margin:0">灵感停车场</h2><button class="btn" id="backFromIdeas">返回设置</button></div><div class="row" style="margin-top:14px"><input id="ideaInput" placeholder="把新想法先放这"><button class="btn primary" id="addIdea">添加</button></div><div id="ideas" style="margin-top:12px"></div></div>
</section>

<section class="page" id="winsPage">
<div class="card"><div class="row"><h2 style="margin:0">已拥有清单</h2><button class="btn" id="backFromWins">返回设置</button></div><div class="row" style="margin-top:14px"><input id="winInput" placeholder="记录你已经有了什么"><button class="btn primary" id="addWin">添加</button></div><div id="wins" style="margin-top:12px"></div></div>
</section>

<section class="page" id="scoreHistoryPage">
<div class="card"><div class="row"><h2 style="margin:0">雅思成绩记录</h2><button class="btn" id="backFromScoreHistory">返回设置</button></div><div id="scoreList" style="margin-top:14px"></div></div>
</section>

<section class="page" id="tuPublishHistoryPage">
<div class="card"><div class="row"><h2 style="margin:0">家教发布记录</h2><button class="btn" id="backFromTuPublishHistory">返回设置</button></div><div id="tuPublishList" style="margin-top:14px"></div></div>
</section>

<section class="page" id="tuStatusHistoryPage">
<div class="card"><div class="row"><h2 style="margin:0">家教收入/学生记录</h2><button class="btn" id="backFromTuStatusHistory">返回设置</button></div><div id="tuStatusList" style="margin-top:14px"></div></div>
</section>

<section class="page" id="fiRecordHistoryPage">
<div class="card"><div class="row"><h2 style="margin:0">小说进度记录</h2><button class="btn" id="backFromFiRecordHistory">返回设置</button></div><div id="fiRecordList" style="margin-top:14px"></div></div>
</section>
</div>
<nav class="nav"><button class="tab active" data-page="home">首页</button><button class="tab" data-page="lines">主线</button><button class="tab" data-page="review">复盘</button><button class="tab" data-page="settings">设置</button></nav>
<div class="toast" id="toast"></div>
<script src="./cloud-config.js"></script>
<script>
const KEY='direction-board-v8-preview';
const API=(window.CLOUD_CONFIG&&window.CLOUD_CONFIG.CLOUD_API_URL)||'';
const TOKEN=(window.CLOUD_CONFIG&&window.CLOUD_CONFIG.CLOUD_TOKEN)||'';
const startDate='2026-04-28';
const tuStages=[{n:'阶段1：0-90天',days:90,i:6000,s:3,a:48,w:4},{n:'阶段2：90-180天',days:90,i:10000,s:4,a:60,w:5},{n:'阶段3：180-365天',days:185,i:12000,s:5,a:72,w:3},{n:'阶段4：365天+',days:365,i:15000,s:6,a:96,w:2}];
const fiStages=[{n:'阶段1：0-90天',days:90,d:12,a:12,im:18,r:12,inc:500,w:{d:1,a:1,im:2,r:1}},{n:'阶段2：90-180天',days:90,d:10,a:8,im:12,r:20,inc:2000,w:{d:1,a:1,im:1,r:2}},{n:'阶段3：180-365天',days:185,d:20,a:12,im:12,r:40,inc:8000,w:{d:1,a:1,im:1,r:2}},{n:'阶段4：365天+',days:365,d:40,a:24,im:24,r:80,inc:50000,w:{d:1,a:1,im:1,r:2}}];
const subName={reading:'阅读',listening:'听力',writing:'写作',speaking:'口语'}, fiName={draft:'原创初稿',analysis:'拆解',imitation:'仿写',revision:'修改',income:'收入'};
const def={northStar:'27岁前累计现金30w；8月雅思8+，冲8.5；家教稳定增收；短篇小说持续产出并验证收入。',ielts:{rd:0,ld:0,t1:0,t2:0,sp:0,mk:0,prep:Array(10).fill(false),scores:[]},tu:{inc:2320,stu:0,publish:[],statusHistory:[]},fi:{records:[]},cash:{target:300000,savings:71630,invest:8100,cashAuto:6320,investAuto:1500,lastMonth:'2026-04'},rem:{morning:'09:00',noon:'14:00',night:'22:00'},morningTip:'先看北极星，再做主线。',noonTip:'检查今天有没有推进雅思、家教、小说。',nightTip:'复盘今天推进了什么，明天先做什么。',ideas:[],wins:[],reviewToday:'',reviewTomorrow:'',active:'home'};
let state=load(); const $=id=>document.getElementById(id);
function load(){try{return norm(JSON.parse(localStorage.getItem(KEY)||localStorage.getItem('direction-board-v7-preview')||'null')||def)}catch(e){return norm(def)}}
function norm(s){return {...def,...s,ielts:{...def.ielts,...(s.ielts||{}),scores:Array.isArray(s.ielts&&s.ielts.scores)?s.ielts.scores:[],prep:Array.isArray(s.ielts&&s.ielts.prep)?s.ielts.prep:def.ielts.prep},tu:{...def.tu,...(s.tu||{}),publish:Array.isArray(s.tu&&s.tu.publish)?s.tu.publish:[],statusHistory:Array.isArray(s.tu&&s.tu.statusHistory)?s.tu.statusHistory:[]},fi:{...def.fi,...(s.fi||{}),records:Array.isArray(s.fi&&s.fi.records)?s.fi.records:[]},cash:{...def.cash,...(s.cash||{})},rem:{...def.rem,...(s.rem||{})},ideas:Array.isArray(s.ideas)?s.ideas:[],wins:Array.isArray(s.wins)?s.wins:[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));render();syncLater()}
function pct(v){return Math.round(Math.max(0,Math.min(1,Number(v)||0))*100)} function money(n){return Math.round(Number(n)||0).toLocaleString('zh-CN')} function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)} function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),2200)}
function dayNum(d){return Math.floor(new Date(d+'T00:00:00').getTime()/86400000)} function todayStr(){return new Date().toISOString().slice(0,10)}
function autoStage(){let diff=dayNum(todayStr())-dayNum(startDate);if(diff<90)return 0;if(diff<180)return 1;if(diff<365)return 2;return 3}
function stageStartEnd(idx){let start=dayNum(startDate);let offset=0;for(let i=0;i<idx;i++)offset+=tuStages[i].days;let st=start+offset,en=idx<3?st+tuStages[idx].days-1:99999999;return{st,en}}
function inStage(date,idx){let d=dayNum(date),r=stageStartEnd(idx);return d>=r.st&&d<=r.en}
function weekRange(){let now=new Date(),day=now.getDay()||7,monday=new Date(now);monday.setDate(now.getDate()-day+1);let sunday=new Date(monday);sunday.setDate(monday.getDate()+6);return{st:dayNum(monday.toISOString().slice(0,10)),en:dayNum(sunday.toISOString().slice(0,10))}}
function inWeek(date){let d=dayNum(date),w=weekRange();return d>=w.st&&d<=w.en}
function monthPlus(k){let[y,m]=k.split('-').map(Number);m++;if(m>12){m=1;y++}return y+'-'+String(m).padStart(2,'0')} function lastDay(y,m){return new Date(y,m,0)}
function autoCash(){let n=monthPlus(state.cash.lastMonth||'2026-04'),now=new Date(),c=0;while(true){let[y,m]=n.split('-').map(Number);if(now>=lastDay(y,m)){state.cash.savings+=(Number(state.cash.cashAuto)||0);state.cash.invest+=(Number(state.cash.investAuto)||0);state.cash.lastMonth=n;n=monthPlus(n);c++}else break}if(c){localStorage.setItem(KEY,JSON.stringify(state));setTimeout(()=>toast('已自动累计 '+c+' 个月资产'),500)}}
function avg(sub){let arr=state.ielts.scores.filter(x=>x.sub===sub).sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(b.at||'').localeCompare(a.at||'')).slice(0,3);return arr.length?arr.reduce((s,x)=>s+Number(x.score),0)/arr.length:0}
function countUniqueSubject(sub){let set=new Set();state.ielts.scores.filter(x=>x.sub===sub).forEach(x=>{let key=`${x.cam||''}-${x.test||''}-${x.sub}`;if(x.cam&&x.test)set.add(key);else set.add(x.id)});return set.size}
function calcI(){let i=state.ielts,rdCount=countUniqueSubject('reading'),ldCount=countUniqueSubject('listening'),prac=(Math.min(rdCount/40,1)+Math.min(ldCount/40,1)+(Math.min(i.t1/30,1)+Math.min(i.t2/30,1))/2+Math.min(i.sp/110,1))/4,stab=(Math.min(avg('reading')/9,1)+Math.min(avg('listening')/9,1)+Math.min(avg('writing')/8,1)+Math.min(avg('speaking')/8,1))/4,ready=Math.min(i.mk/4,1)*.5+(i.prep.filter(Boolean).length/10)*.5;return{all:pct(prac*.4+stab*.4+ready*.2),prac:pct(prac),stab:pct(stab),ready:pct(ready),avgs:[avg('reading'),avg('listening'),avg('writing'),avg('speaking')]}}
function tuStageRecords(){let idx=autoStage(), st=tuStages[idx], stage=state.tu.publish.filter(x=>inStage(x.date,idx)).reduce((sum,x)=>sum+(Number(x.amount)||1),0), week=state.tu.publish.filter(x=>inWeek(x.date)).reduce((sum,x)=>sum+(Number(x.amount)||1),0);let incP=Math.min(state.tu.inc/st.i,1),actP=Math.min(stage/st.a,1),stuP=Math.min(state.tu.stu/st.s,1);return{idx,st,stage,week,all:pct(incP*.6+actP*.25+stuP*.15),inc:pct(incP),act:pct(actP),stu:pct(stuP)}}
function fiStats(){let idx=autoStage(), st=fiStages[idx], stageRecs=state.fi.records.filter(x=>inStage(x.date,idx)), weekRecs=state.fi.records.filter(x=>inWeek(x.date));let sum=(arr,type)=>arr.filter(x=>x.type===type).reduce((s,x)=>s+(Number(x.amount)||1),0);let sc={d:sum(stageRecs,'draft'),a:sum(stageRecs,'analysis'),im:sum(stageRecs,'imitation'),r:sum(stageRecs,'revision'),inc:sum(stageRecs,'income')};let wk={d:sum(weekRecs,'draft'),a:sum(weekRecs,'analysis'),im:sum(weekRecs,'imitation'),r:sum(weekRecs,'revision')};let d=Math.min(sc.d/st.d,1),a=Math.min(sc.a/st.a,1),im=Math.min(sc.im/st.im,1),r=Math.min(sc.r/st.r,1),inc=Math.min(sc.inc/st.inc,1),study=(a+im)/2;let all=idx===0?d*.45+a*.2+im*.15+r*.15+inc*.05:idx===1?d*.3+r*.25+study*.15+inc*.2:idx===2?d*.2+r*.3+inc*.25+study*.15:inc*.35+r*.25+d*.2+study*.2;let wDone=Math.min(wk.d,st.w.d)+Math.min(wk.a,st.w.a)+Math.min(wk.im,st.w.im)+Math.min(wk.r,st.w.r),wTotal=st.w.d+st.w.a+st.w.im+st.w.r;return{idx,st,sc,wk,wDone,wTotal,all:pct(all),d:pct(d),study:pct(study),r:pct(r),inc:pct(inc)}}
function stage(){let i=calcI(),t=tuStageRecords(),f=fiStats();return{all:Math.round(i.all*.4+t.all*.3+f.all*.3),i,t,f}}
function card(n,v){return `<div class="mini"><div class="name">${n}</div><div class="value">${v}%</div><div class="bar"><span style="width:${v}%"></span></div></div>`}
function render(){let s=stage();$('stageNum').textContent=s.all+'%';$('stageBar').style.width=s.all+'%';$('stageText').textContent=`雅思 ${s.i.all}%｜家教 ${s.t.all}%｜小说 ${s.f.all}%`;$('lineCards').innerHTML=card('雅思',s.i.all)+card('家教',s.t.all)+card('小说',s.f.all);$('homeYesterday').textContent=state.reviewToday&&state.reviewToday.trim()?state.reviewToday:'暂无';$('homeToday').textContent=state.reviewTomorrow&&state.reviewTomorrow.trim()?state.reviewTomorrow:'暂无';$('stageDetails').innerHTML=`<div class="muted">雅思目标：阅读9｜听力9｜写作8｜口语8｜考试 8.16</div><div class="muted" style="margin-top:8px">家教阶段：${s.t.st.n}｜发布 ${s.t.stage}/${s.t.st.a}｜收入 ${money(state.tu.inc)}/${money(s.t.st.i)}｜学生 ${state.tu.stu}/${s.t.st.s}</div><div class="muted" style="margin-top:8px">小说阶段：${s.f.st.n}｜初稿 ${s.f.sc.d}/${s.f.st.d}｜拆解 ${s.f.sc.a}/${s.f.st.a}｜仿写 ${s.f.sc.im}/${s.f.st.im}｜修改 ${s.f.sc.r}/${s.f.st.r}｜收入 ${money(s.f.sc.inc)}/${money(s.f.st.inc)}</div>`;$('northStar').value=state.northStar;
$('ieltsNum').textContent=s.i.all+'%';$('ieltsBar').style.width=s.i.all+'%';$('ieltsAvg').textContent=`阅读 ${s.i.avgs[0].toFixed(1)}｜听力 ${s.i.avgs[1].toFixed(1)}｜写作 ${s.i.avgs[2].toFixed(1)}｜口语 ${s.i.avgs[3].toFixed(1)}`;$('ieltsParts').innerHTML=card('练习量',s.i.prac)+card('能力稳定',s.i.stab)+card('考试准备',s.i.ready);
$('tuWeekText').textContent=`${s.t.week}/${s.t.st.w}`;$('tuWeekBar').style.width=pct(s.t.week/s.t.st.w)+'%';
$('fiWeekText').textContent=`${s.f.wDone}/${s.f.wTotal}`;$('fiWeekBar').style.width=pct(s.f.wDone/s.f.wTotal)+'%';$('fiWeekBreakdown').innerHTML=`<span class="pill">初稿 ${s.f.wk.d}/${s.f.st.w.d}</span><span class="pill">拆解 ${s.f.wk.a}/${s.f.st.w.a}</span><span class="pill">仿写 ${s.f.wk.im}/${s.f.st.w.im}</span><span class="pill">修改 ${s.f.wk.r}/${s.f.st.w.r}</span>`;
renderForms();renderCash();renderLists()}
function renderCash(){let cur=state.cash.savings+state.cash.invest,gap=Math.max(0,state.cash.target-cur),p=pct(cur/state.cash.target);$('cashPct').textContent=p+'%';$('cashBar').style.width=p+'%';$('cashText').textContent=`当前 ${money(cur)}｜还差 ${money(gap)}`;$('cashCards').innerHTML=`<div class="mini"><div class="name">当前资产</div><div class="value">${money(cur)}</div></div><div class="mini"><div class="name">目标现金</div><div class="value">${money(state.cash.target)}</div></div><div class="mini"><div class="name">距离目标</div><div class="value">${money(gap)}</div></div>`;$('autoText').textContent=`从2026-05-31开始，每月底后首次打开自动：存款 +${money(state.cash.cashAuto)}，投资 +${money(state.cash.investAuto)}。已累计到：${state.cash.lastMonth}`}
function renderForms(){['t1','t2','sp','mk'].forEach(k=>$(k).value=state.ielts[k]);if($('readingAutoCount'))$('readingAutoCount').textContent=countUniqueSubject('reading')+'/40';if($('listeningAutoCount'))$('listeningAutoCount').textContent=countUniqueSubject('listening')+'/40';$('tuI').value=state.tu.inc;$('tuStu').value=state.tu.stu;$('cashTarget').value=state.cash.target;$('cashSavings').value=state.cash.savings;$('invest').value=state.cash.invest;$('cashAuto').value=state.cash.cashAuto;$('investAuto').value=state.cash.investAuto;$('morningTime').value=state.rem.morning;$('noonTime').value=state.rem.noon;$('nightTime').value=state.rem.night;$('morningTip').value=state.morningTip;$('noonTip').value=state.noonTip;$('nightTip').value=state.nightTip;$('reviewToday').value=state.reviewToday;$('reviewTomorrow').value=state.reviewTomorrow;if(!$('scoreDate').value)$('scoreDate').value=new Date().toISOString().slice(0,10);if($('tuPubDate')&&!$('tuPubDate').value)$('tuPubDate').value=todayStr();if($('fiDate')&&!$('fiDate').value)$('fiDate').value=todayStr();$('prep').innerHTML='<div class="small" style="margin-top:14px;margin-bottom:8px">考试准备清单</div><div class="prepList">'+['确认考试日期：8.16','完成报名 / 考位确认','熟悉考试流程','熟悉机考界面或纸笔流程','整理阅读错题类型','整理听力错题类型','整理小作文常见题型','整理大作文高频话题','口语 Part 1 高频题过完','口语 Part 2 / Part 3 高频题过完'].map((x,i)=>`<label class="prepItem"><input type="checkbox" data-prep="${i}" ${state.ielts.prep[i]?'checked':''}><span>${x}</span></label>`).join('')+'</div>'}
function renderLists(){$('ideas').innerHTML=state.ideas.map((x,i)=>`<div class="record"><div class="main">${x}</div><button class="btn danger smallBtn" onclick="delIdea(${i})">删除</button></div>`).join('')||'<div class="muted">还没有内容。</div>';$('wins').innerHTML=state.wins.map((x,i)=>`<div class="record"><div class="main">${x}</div><button class="btn danger smallBtn" onclick="delWin(${i})">删除</button></div>`).join('')||'<div class="muted">还没有内容。</div>';
$('scoreList').innerHTML=state.ielts.scores.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(r=>`<div class="record"><div><div class="main">${r.date}｜C${r.cam} T${r.test}｜${subName[r.sub]} ${r.score}</div><div class="sub">${r.note||''}</div></div><button class="btn danger smallBtn" onclick="delScore('${r.id}')">删除</button></div>`).join('')||'<div class="muted">暂无成绩记录。</div>';$('tuPublishList').innerHTML=state.tu.publish.map(r=>`<div class="record"><div><div class="main">${r.date}｜招生发布 +${r.amount||1}</div><div class="sub">${r.note||''}</div></div><button class="btn danger smallBtn" onclick="delTuPub('${r.id}')">删除</button></div>`).join('')||'<div class="muted">暂无发布记录。</div>';$('tuStatusList').innerHTML=state.tu.statusHistory.map(r=>`<div class="record"><div><div class="main">${r.date}｜收入${money(r.inc)}｜学生${r.stu}</div></div><button class="btn soft smallBtn" onclick="applyTuStatus('${r.id}')">恢复</button></div>`).join('')||'<div class="muted">暂无收入/学生记录。</div>';$('fiRecordList').innerHTML=state.fi.records.map(r=>`<div class="record"><div><div class="main">${r.date}｜${fiName[r.type]} +${money(r.amount||1)}</div><div class="sub">${r.note||''}</div></div><button class="btn danger smallBtn" onclick="delFiRec('${r.id}')">删除</button></div>`).join('')||'<div class="muted">暂无小说记录。</div>'}
document.addEventListener('input',e=>{if(['northStar','morningTip','noonTip','nightTip','reviewToday','reviewTomorrow'].includes(e.target.id)){state[e.target.id]=e.target.value;save()}if(['t1','t2','sp','mk'].includes(e.target.id)){state.ielts[e.target.id]=Number(e.target.value)||0;save()}});
document.addEventListener('change',e=>{if(e.target.dataset.prep!==undefined){state.ielts.prep[Number(e.target.dataset.prep)]=e.target.checked;save()}});
$('addScore').onclick=()=>{let score=Number($('score').value);if(!score)return toast('请填写分数');state.ielts.scores.push({id:uid(),date:$('scoreDate').value,cam:$('cam').value,test:$('test').value,sub:$('sub').value,score,note:$('note').value,at:new Date().toISOString()});$('score').value='';$('note').value='';save();toast('成绩已保存')};
$('saveTuPublish').onclick=()=>{let amount=Number($('tuPubAmount').value)||0;if(!amount)return toast('请填写本次发布数量');let date=$('tuPubDate').value||todayStr();let note=$('tuPubNote').value||'';if(!confirm(`确认保存招生发布 ${amount} 条吗？`))return;state.tu.publish.unshift({id:uid(),date,amount,note,at:new Date().toISOString()});$('tuPubAmount').value='';$('tuPubNote').value='';save();toast('招生发布已保存')};
$('saveTuStatus').onclick=()=>{let r={id:uid(),date:todayStr(),inc:Number($('tuI').value)||0,stu:Number($('tuStu').value)||0};if(!confirm(`确认保存收入 ${money(r.inc)} / 学生 ${r.stu} 吗？`))return;state.tu.inc=r.inc;state.tu.stu=r.stu;state.tu.statusHistory.unshift(r);save();toast('收入/学生已保存')};
$('saveFiProgress').onclick=()=>{let date=$('fiDate').value||todayStr();let draft=Number($('fiDraftInput').value)||0, analysis=Number($('fiAnalysisInput').value)||0, imitation=Number($('fiImitationInput').value)||0, revision=Number($('fiRevisionInput').value)||0, income=Number($('fiIncomeInput').value)||0, note=$('fiNoteInput').value||'';if(!(draft||analysis||imitation||revision||income))return toast('请至少填写一项');let msg=`确认保存小说进度吗？\n初稿 ${draft}｜拆解 ${analysis}｜仿写 ${imitation}｜修改 ${revision}｜收入 ${money(income)}`;if(!confirm(msg))return;let at=new Date().toISOString();if(draft)state.fi.records.unshift({id:uid(),date,type:'draft',amount:draft,note,at});if(analysis)state.fi.records.unshift({id:uid(),date,type:'analysis',amount:analysis,note,at});if(imitation)state.fi.records.unshift({id:uid(),date,type:'imitation',amount:imitation,note,at});if(revision)state.fi.records.unshift({id:uid(),date,type:'revision',amount:revision,note,at});if(income)state.fi.records.unshift({id:uid(),date,type:'income',amount:income,note,at});['fiDraftInput','fiAnalysisInput','fiImitationInput','fiRevisionInput','fiIncomeInput','fiNoteInput'].forEach(id=>$(id).value='');save();toast('小说进度已保存')};
$('openIdeas').onclick=()=>switchToPage('ideasPage');$('openWins').onclick=()=>switchToPage('winsPage');$('backFromIdeas').onclick=()=>switchToPage('settings');$('backFromWins').onclick=()=>switchToPage('settings');
$('openScoreHistory').onclick=()=>switchToPage('scoreHistoryPage');$('openTuPublishHistory').onclick=()=>switchToPage('tuPublishHistoryPage');$('openTuStatusHistory').onclick=()=>switchToPage('tuStatusHistoryPage');$('openFiRecordHistory').onclick=()=>switchToPage('fiRecordHistoryPage');
$('backFromScoreHistory').onclick=()=>switchToPage('settings');$('backFromTuPublishHistory').onclick=()=>switchToPage('settings');$('backFromTuStatusHistory').onclick=()=>switchToPage('settings');$('backFromFiRecordHistory').onclick=()=>switchToPage('settings');$('addIdea').onclick=()=>{let v=$('ideaInput').value.trim();if(v&&confirm('确认添加到灵感停车场吗？')){state.ideas.unshift(v);$('ideaInput').value='';save()}};$('addWin').onclick=()=>{let v=$('winInput').value.trim();if(v&&confirm('确认添加到已拥有清单吗？')){state.wins.unshift(v);$('winInput').value='';save()}};
function delIdea(i){if(confirm('确认删除这条灵感吗？')){state.ideas.splice(i,1);save()}} function delWin(i){if(confirm('确认删除这条记录吗？')){state.wins.splice(i,1);save()}} function delScore(i){if(confirm('确认删除这条成绩记录吗？')){state.ielts.scores=state.ielts.scores.filter(x=>x.id!==i);save()}} function delTuPub(i){if(confirm('确认删除这条招生发布记录吗？')){state.tu.publish=state.tu.publish.filter(x=>x.id!==i);save()}} function delFiRec(i){if(confirm('确认删除这条小说记录吗？')){state.fi.records=state.fi.records.filter(x=>x.id!==i);save()}} function applyTuStatus(i){let r=state.tu.statusHistory.find(x=>x.id===i);if(r&&confirm('确认恢复这条收入/学生记录吗？')){state.tu.inc=r.inc;state.tu.stu=r.stu;save()}}
$('saveReminder').onclick=async()=>{state.rem={morning:$('morningTime').value||'09:00',noon:$('noonTime').value||'14:00',night:$('nightTime').value||'22:00'};state.morningTip=$('morningTip').value;state.noonTip=$('noonTip').value;state.nightTip=$('nightTip').value;if(!confirm('确认保存提醒设置吗？'))return;save();toast('提醒设置已保存')};$('saveCashData').onclick=()=>{let data={target:Number($('cashTarget').value)||0,savings:Number($('cashSavings').value)||0,invest:Number($('invest').value)||0,cashAuto:Number($('cashAuto').value)||0,investAuto:Number($('investAuto').value)||0};if(!confirm('确认保存资产数据吗？'))return;Object.assign(state.cash,data);save();toast('资产数据已保存')};
let timer=null;function syncLater(){if(!API||!TOKEN)return;clearTimeout(timer);timer=setTimeout(()=>saveCloud(false),2000)}
async function saveCloud(show=true){if(!API||!TOKEN){if(show)toast('云端未配置');return}try{await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'save',token:TOKEN,data:state})});if(show)toast('已同步到云端')}catch(e){if(show)toast('同步失败')}}
function loadCloud(show=true){if(!API||!TOKEN){if(show)toast('云端未配置');return}let cb='cb'+Date.now(),sc=document.createElement('script');window[cb]=j=>{if(j&&j.ok&&j.data){state=norm(j.data);save();render();toast('已从云端恢复')}delete window[cb];sc.remove()};sc.src=API+'?action=load&token='+encodeURIComponent(TOKEN)+'&callback='+cb+'&t='+Date.now();document.body.appendChild(sc)}
$('cloudSave').onclick=()=>saveCloud(true);$('cloudLoad').onclick=()=>loadCloud(true);
$('exportBtn').onclick=()=>{let b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='direction-board-backup.json';a.click();URL.revokeObjectURL(u)};
$('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=async e=>{let f=e.target.files[0];if(!f)return;state=norm(JSON.parse(await f.text()));save();render()};
function switchToPage(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));$(page).classList.add('active');document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.page===page));state.active=page;localStorage.setItem(KEY,JSON.stringify(state))}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchToPage(b.dataset.page));
autoCash(); render();
</script>
